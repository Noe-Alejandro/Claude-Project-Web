name: CodeQL Security Analysis

on:
  push:
    branches:
      - main
  pull_request:
  schedule:
    # Run a full scan every Sunday at midnight UTC — catches newly published CVEs
    # even when there are no code changes
    - cron: "0 0 * * 0"

permissions:
  contents: read
  security-events: write

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: CodeQL Analysis
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: javascript-typescript
          # security-extended adds more rules beyond the default security suite.
          # security-and-quality also includes maintainability rules — enable if
          # you want deeper analysis at the cost of more noise.
          queries: security-extended

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: /language:javascript-typescript
